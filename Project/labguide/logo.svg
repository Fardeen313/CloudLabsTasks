<svg width="680" height="680" viewBox="0 0 680 680" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .bg-outer { fill: #0a1628; }
      .bg-inner { fill: #0d1f3c; }
      .ring-1 { fill: none; stroke: #0078d4; stroke-width: 1.5; opacity: 0.3; }
      .ring-2 { fill: none; stroke: #50e6ff; stroke-width: 1; opacity: 0.2; }
      .hex-border { fill: none; stroke: #0078d4; stroke-width: 0.8; opacity: 0.4; }
      .cloud-main { fill: #0078d4; }
      .cloud-light { fill: #50e6ff; }
      .vm-box { fill: #1a3a5c; stroke: #0078d4; stroke-width: 1.5; }
      .vm-screen { fill: #0d2137; }
      .bolt { fill: #50e6ff; }
      .label-main { font-family: 'Segoe UI', system-ui, sans-serif; font-size: 38px; font-weight: 700; fill: #ffffff; }
      .label-sub { font-family: 'Segoe UI', system-ui, sans-serif; font-size: 16px; font-weight: 400; fill: #50e6ff; letter-spacing: 4px; }
      .label-tag { font-family: 'Segoe UI', system-ui, sans-serif; font-size: 12px; font-weight: 400; fill: #7ab8d9; }
      .orbit-dot { fill: #50e6ff; }
      .orbit-line { fill: none; stroke: #50e6ff; stroke-width: 0.8; opacity: 0.25; stroke-dasharray: 4 4; }
      .glow-blue { fill: #0078d4; opacity: 0.15; }
      .particle { fill: #50e6ff; opacity: 0.6; }
      .line-accent { stroke: #50e6ff; stroke-width: 1; opacity: 0.4; fill: none; }
      .box-accent { fill: none; stroke: #0078d4; stroke-width: 1; opacity: 0.5; }
    </style>
  </defs>

  <circle cx="340" cy="340" r="320" class="bg-outer"/>
  <circle cx="340" cy="340" r="290" class="bg-inner"/>
  <circle cx="340" cy="340" r="270" class="ring-1"/>
  <circle cx="340" cy="340" r="240" class="ring-2"/>
  <circle cx="340" cy="340" r="210" class="ring-1"/>

  <ellipse cx="340" cy="340" rx="220" ry="70" transform="rotate(-30 340 340)" class="orbit-line"/>
  <ellipse cx="340" cy="340" rx="220" ry="70" transform="rotate(30 340 340)" class="orbit-line"/>

  <g opacity="0.18">
    <polygon points="340,120 372,138 372,174 340,192 308,174 308,138" class="hex-border"/>
    <polygon points="404,156 436,174 436,210 404,228 372,210 372,174" class="hex-border"/>
    <polygon points="276,156 308,174 308,210 276,228 244,210 244,174" class="hex-border"/>
    <polygon points="340,408 372,426 372,462 340,480 308,462 308,426" class="hex-border"/>
    <polygon points="404,444 436,462 436,498 404,516 372,498 372,462" class="hex-border"/>
    <polygon points="276,444 308,462 308,498 276,516 244,498 244,462" class="hex-border"/>

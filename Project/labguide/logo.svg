  <circle cx="205" cy="175" r="4" class="orbit-dot" opacity="0.6"/>
  <circle cx="480" cy="195" r="5" class="orbit-dot" opacity="0.7"/>
  <circle cx="550" cy="330" r="4" class="orbit-dot" opacity="0.5"/>
  <circle cx="455" cy="460" r="6" class="orbit-dot" opacity="0.6"/>
  <circle cx="200" cy="455" r="4" class="orbit-dot" opacity="0.5"/>

  <circle cx="160" cy="240" r="2" class="particle"/>
  <circle cx="500" cy="250" r="2" class="particle"/>
  <circle cx="170" cy="390" r="2" class="particle"/>
  <circle cx="510" cy="400" r="2" class="particle"/>
  <circle cx="300" cy="480" r="2" class="particle"/>
  <circle cx="390" cy="145" r="2" class="particle"/>

  <line x1="80" y1="370" x2="260" y2="370" class="line-accent"/>
  <line x1="420" y1="370" x2="600" y2="370" class="line-accent"/>
  <circle cx="80" cy="370" r="2.5" fill="#50e6ff" opacity="0.5"/>
  <circle cx="260" cy="370" r="2.5" fill="#50e6ff" opacity="0.5"/>
  <circle cx="420" cy="370" r="2.5" fill="#50e6ff" opacity="0.5"/>
  <circle cx="600" cy="370" r="2.5" fill="#50e6ff" opacity="0.5"/>

  <text x="340" y="420" text-anchor="middle" class="label-main">CloudLabs</text>
  <text x="340" y="452" text-anchor="middle" class="label-sub">AUTOMATION LAB</text>
  <text x="340" y="488" text-anchor="middle" class="label-tag">Windows VM · Azure · PowerShell · ARM</text>

  <rect x="90" y="90" width="18" height="18" rx="2" class="box-accent"/>
  <rect x="572" y="90" width="18" height="18" rx="2" class="box-accent"/>
  <rect x="90" y="572" width="18" height="18" rx="2" class="box-accent"/>
  <rect x="572" y="572" width="18" height="18" rx="2" class="box-accent"/>
</svg>

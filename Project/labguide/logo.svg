  <rect x="300" y="261" width="35" height="3" rx="1" fill="#50e6ff" opacity="0.5"/>
  <rect x="300" y="268" width="42" height="3" rx="1" fill="#0078d4" opacity="0.5"/>
  <rect x="300" y="275" width="28" height="3" rx="1" fill="#50e6ff" opacity="0.4"/>
  <circle cx="357" cy="255" r="3" fill="#28c840"/>
  <circle cx="366" cy="255" r="3" fill="#febc2e"/>
  <circle cx="375" cy="255" r="3" fill="#ff5f57"/>
  <rect x="296" y="295" width="88" height="6" rx="2" fill="#0078d4" opacity="0.4"/>

  <g transform="translate(408, 228)">

AWSTemplateFormatVersion: '2010-09-09'
Description: Windows EC2 Environment using Default VPC

Resources:

  DefaultVPC:
    Type: AWS::EC2::VPC
    Properties: {}
    DeletionPolicy: Retain

  LabSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow RDP Access
      VpcId: !Ref DefaultVPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 3389
          ToPort: 3389
          CidrIp: 0.0.0.0/0

  LabInstance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t3.micro

      ImageId: !Sub "{{resolve:ssm:/aws/service/ami-windows-latest/Windows_Server-2022-English-Full-Base}}"

      SecurityGroupIds:
        - !Ref LabSecurityGroup

      Tags:
        - Key: Name
          Value: CloudLabs-Windows-Instance

Outputs:

  AWSAccountID:
    Description: AWS Account ID
    Value: !Ref AWS::AccountId

  InstanceId:
    Description: Instance ID
    Value: !Ref LabInstance

  Region:
    Description: AWS Region
    Value: !Ref AWS::Region